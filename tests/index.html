<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CulturAI Test Suite</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #111; color: #eee; padding: 40px; }
    h1 { color: #fff; margin-bottom: 10px; }
    #summary { font-size: 18px; margin-bottom: 30px; padding: 15px; background: #222; border-radius: 8px; }
    .pass-count { color: #10b981; font-weight: bold; }
    .fail-count { color: #ef4444; font-weight: bold; }
    .suite { margin-bottom: 20px; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; }
    .suite h3 { margin-top: 0; color: #60a5fa; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .test { padding: 8px 0; font-family: monospace; }
    .test.pass { color: #34d399; }
    .test.fail { color: #f87171; }
  </style>
</head>
<body>
  <h1>🧪 CulturAI Test Suite</h1>
  <div id="summary">Running tests...</div>
  <div id="test-results"></div>
  
  <script src="test-runner.js"></script>
  <script src="app.test.js"></script>
</body>
</html>
